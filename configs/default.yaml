# Default training config for fireplace-backed Hearthstone PPO with multi-deck.
seed: 42
max_iters: 1000
rollout_steps: 2048
ppo_epochs: 4

# 18-deck pool: 9 classes × 2 archetypes
deck_pool:
  - aggro_mage
  - control_mage
  - aggro_warrior
  - control_warrior
  - aggro_hunter
  - control_hunter
  - aggro_druid
  - control_druid
  - aggro_rogue
  - control_rogue
  - aggro_paladin
  - control_paladin
  - aggro_priest
  - control_priest
  - aggro_shaman
  - control_shaman
  - aggro_warlock
  - control_warlock

deck_selection: random_pair        # was "fixed"
training_player_idx: 0             # initial value before first reset
swap_training_player: true         # NEW: random p1/p2 per episode

mulligan_policy: keep_low_cost
mulligan_threshold: 3
discover_policy: first
choose_one_policy: first

lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_epsilon: 0.2
value_coef: 0.5
entropy_coef: 0.03
max_grad_norm: 0.5

slot_dim: 90
hidden_dim: 128
num_actions: 512

curriculum:
  switch_threshold: 0.65           # was 0.80; lowered for multi-deck
  early_stop_patience: 5

self_play:
  refresh_threshold: 0.80
  refresh_eval_games: 20
  refresh_every: 10
  random_opponent_prob: 0.20
  opponent_checkpoint_path: checkpoints/self_play_opponent.pt

eval_every: 10
eval_games: 100                    # was 50; halve sampling noise (σ ≈ 0.05)
max_actions_per_game: 1000

# Milestone (round-robin subprocess; 0 disables)
milestone_every: 100
milestone_games_per_matchup: 5

checkpoint_every: 25
checkpoint_dir: checkpoints
best_checkpoint_path: checkpoints/best.pt

runs_dir: runs

card_features:
  log_coverage: true

# === S2-B aux head ===
aux_loss_coef: 0.5
aux_warmup_iters: 100
aux_counterfactual_k: 4
draw_advantage_threshold: 0.15
